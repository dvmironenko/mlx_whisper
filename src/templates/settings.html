<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLX-Whisper Настройки</title>
    <link rel="stylesheet" href="/static/new_style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <i class="fas fa-microphone-alt"></i> MLX-Whisper
                </h1>
                <p class="app-subtitle">Настройки отчетов</p>
            </div>
        </header>

        <!-- Control bar: theme switcher + actions -->
        <div class="app-controls">
            <div class="theme-switch-container" id="themeSwitchContainer" aria-label="Переключить тему">
                <label class="theme-switch-label" id="themeLabel" for="themeToggle">Светлая</label>
                <div class="theme-switch-wrapper">
                <input type="checkbox" id="themeToggle" class="theme-toggle">
                    <span class="theme-switch-track">
                        <span class="theme-switch-thumb"></span>
                    </span>
                </div>
            </div>
            <div class="app-controls-actions">
                <a href="/" class="btn-new-job">
                    <i class="fas fa-home"></i>
                    <span>Список заданий</span>
                </a>
            </div>
        </div>

        <main class="app-main">
            <div class="upload-section" id="settingsSection">
                <div class="section-header">
                    <h2><i class="fas fa-cog"></i> Настройки</h2>
                </div>
                <div class="section-description">
                    <p>Редактирование промптов для типов отчетов</p>
                </div>

                <!-- Settings form -->
                <div class="settings-form">
                    <div class="form-group">
                        <label for="reportTypeSelect" class="form-label">Тип отчета</label>
                        <select id="reportTypeSelect" class="form-select">
                            <option value="" disabled selected>Загрузка...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reportNameTextarea" class="form-label">Название</label>
                        <textarea id="reportNameTextarea" class="form-input" rows="2" placeholder="Название отчета..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="promptTextarea" class="form-label">Промпт</label>
                        <textarea id="promptTextarea" class="form-input" rows="12" placeholder="Промпт будет подставлен при выборе отчета..."></textarea>
                    </div>

                    <div class="form-buttons">
                        <button id="saveButton" class="submit-button" disabled>
                            <i class="fas fa-save"></i>
                            <span>Сохранить</span>
                        </button>
                        <button type="button" id="refreshButton" class="btn-secondary">
                            <i class="fas fa-sync-alt"></i>
                            <span>Обновить параметры</span>
                        </button>
                    </div>

                    <!-- Notification zone -->
                    <div id="notificationZone" class="notification-zone" style="display: none;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
    // Theme switcher
    (function() {
        const toggle = document.getElementById('themeToggle');
        const label = document.getElementById('themeLabel');
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggle.checked = true;
            label.textContent = 'Тёмная';
        }
        toggle.addEventListener('change', function() {
            if (this.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                label.textContent = 'Тёмная';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                label.textContent = 'Светлая';
                localStorage.setItem('theme', 'light');
            }
        });
    })();

    // Settings logic
    (async function() {
        const select = document.getElementById('reportTypeSelect');
        const nameTextarea = document.getElementById('reportNameTextarea');
        const textarea = document.getElementById('promptTextarea');
        const saveBtn = document.getElementById('saveButton');
        const refreshBtn = document.getElementById('refreshButton');
        const notif = document.getElementById('notificationZone');

        let originalPrompts = {}; // {id: prompt} — для сравнения
        let originalNames = {}; // {id: name} — для сравнения
        let selectedOriginal = null; // оригинальный промпт выбранного отчета
        let selectedOriginalName = null; // оригинальное название выбранного отчета
        let reportTypesData = null; // данные отчетов для хендлера

        function showToast(msg, type) {
            notif.removeAttribute('style');
            notif.style.display = 'block';
            notif.textContent = msg;
            notif.style.color = type === 'success' ? 'var(--success-color)' : 'var(--error-color)';
            notif.style.marginTop = '16px';
            notif.style.padding = '8px 12px';
            notif.style.borderRadius = '6px';
            notif.style.border = `1px solid ${type === 'success' ? 'var(--success-color)' : 'var(--error-color)'}`;
            setTimeout(function() { notif.removeAttribute('style'); notif.style.display = 'none'; }, 3000);
        }

        refreshBtn.addEventListener('click', async function() {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Обновление...</span>';

            try {
                const resp = await fetch('/api/v1/settings/refresh', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                });
                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.detail || 'Ошибка обновления');
                }

                // Обновить select report types
                select.innerHTML = '';
                data.settings.forEach(function(t) {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = t.name;
                    originalPrompts[t.id] = t.prompt || '';
                    originalNames[t.id] = t.name || '';
                    select.appendChild(opt);
                });

                // Сбросить выбранный отчет на первый
                const firstId = data.settings[0]?.id;
                if (firstId) {
                    select.value = firstId;
                    select.dispatchEvent(new Event('change'));
                }

                reportTypesData = {types: data.settings};
                showToast('Параметры обновлены', 'success');
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> <span>Обновить параметры</span>';
            }
        });

        // Загрузить отчеты
        try {
            const resp = await fetch('/api/v1/settings');
            reportTypesData = await resp.json();
            if (!reportTypesData.types || reportTypesData.types.length === 0) {
                select.innerHTML = '<option value="" disabled selected>Нет типов отчетов</option>';
                return;
            }
            select.innerHTML = '';
            reportTypesData.types.forEach(function(t) {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.name;
                originalPrompts[t.id] = t.prompt || '';
                originalNames[t.id] = t.name || '';
                select.appendChild(opt);
            });
        } catch (e) {
            select.innerHTML = '<option value="" disabled selected>Ошибка загрузки</option>';
            return;
        }

        // При смене отчета
        select.addEventListener('change', function() {
            const id = this.value;
            if (!id) return;
            const type = reportTypesData.types.find(t => t.id === id);
            if (type) {
                nameTextarea.value = type.name;
            }
            textarea.value = originalPrompts[id] || '';
            selectedOriginal = originalPrompts[id] || '';
            selectedOriginalName = originalNames[id] || '';
            checkChanged();
        });

        // При ручном редактировании промпта или названия
        textarea.addEventListener('input', checkChanged);
        nameTextarea.addEventListener('input', checkChanged);

        // Автовыбор первого отчета
        if (!reportTypesData || !reportTypesData.types || reportTypesData.types.length === 0) return;
        const firstId = reportTypesData.types[0].id;
        select.value = firstId;
        select.dispatchEvent(new Event('change'));

        function checkChanged() {
            saveBtn.disabled = (textarea.value === selectedOriginal && nameTextarea.value === selectedOriginalName);
        }

        // Сохранить
        saveBtn.addEventListener('click', async function() {
            const id = select.value;
            if (!id) return;
            const name = nameTextarea.value;
            const prompt = textarea.value;

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Сохранение...</span>';

            try {
                const resp = await fetch('/api/v1/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({report_type: id, name: name, prompt: prompt})
                });
                const result = await resp.json();
                if (!resp.ok) {
                    throw new Error(result.detail || 'Ошибка сохранения');
                }
                // Обновить кэш оригиналов
                originalNames[id] = name;
                originalPrompts[id] = prompt;
                selectedOriginalName = name;
                selectedOriginal = prompt;
                checkChanged();
                showToast('Настройки сохранены', 'success');
            } catch (e) {
                showToast(e.message, 'error');
                checkChanged();
            } finally {
                saveBtn.disabled = (textarea.value === selectedOriginal);
                saveBtn.innerHTML = '<i class="fas fa-save"></i> <span>Сохранить</span>';
            }
        });
    })();
    </script>
</body>
</html>
