<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLX-Transcriber Настройки</title>
    <link rel="stylesheet" href="/static/new_style.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <link rel="stylesheet" href="/static/markdown-wysiwyg/editor.css">
    <script src="/static/markdown-wysiwyg/editor.js?v=2"></script>
</head>
<body>

    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <i class="fas fa-microphone-alt"></i> MLX-Transcriber
                </h1>
                <p class="app-subtitle">Настройки отчетов</p>
            </div>
        </header>

        <!-- Control bar: theme switcher + actions -->
        <div class="app-controls">
            <div class="theme-switch-container" id="themeSwitchContainer" aria-label="Переключить тему">
                <label class="theme-switch-label" id="themeLabel" for="themeToggle">Светлая</label>
                <div class="theme-switch-wrapper">
                <input type="checkbox" id="themeToggle" class="theme-toggle">
                    <span class="theme-switch-track">
                        <span class="theme-switch-thumb"></span>
                    </span>
                </div>
            </div>
            <div class="app-controls-actions">
                <a href="/" class="btn-new-job">
                    <i class="fas fa-home"></i>
                    <span>Список заданий</span>
                </a>
            </div>
        </div>

        <main class="app-main">
            <div class="upload-section" id="settingsSection">
                <div class="section-header">
                    <h2><i class="fas fa-cog"></i> Настройки</h2>
                </div>
                <div class="form-group">
                    <label for="mechanismModelSelect" class="form-label">Механизм</label>
                    <select id="mechanismModelSelect" class="form-select">
                        <option value="" disabled selected>Загрузка...</option>
                    </select>
                </div>

                <div class="section-description">
                    <p>Редактирование промптов для типов отчетов</p>
                </div>

                <!-- Settings form -->
                <div class="settings-form">
                    <div class="form-group">
                        <label for="reportTypeSelect" class="form-label">Тип отчета</label>
                        <select id="reportTypeSelect" class="form-select">
                            <option value="" disabled selected>Загрузка...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reportNameTextarea" class="form-label">Название</label>
                        <textarea id="reportNameTextarea" class="form-input" rows="1" placeholder="Название отчета..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="promptTextarea" class="form-label">Промпт</label>
                        <textarea id="promptTextarea" class="form-input" rows="12" placeholder="Промпт будет подставлен при выборе отчета..."></textarea>
                    </div>

                    <button type="button" id="editPromptBtn" class="btn-edit-prompt">
                        <i class="fas fa-pen"></i>
                        <span>Редактировать</span>
                    </button>

                    <div class="form-buttons">
                        <button id="saveButton" class="submit-button" disabled>
                            <i class="fas fa-save"></i>
                            <span>Сохранить</span>
                        </button>
                        <button type="button" id="refreshButton" class="submit-button">
                            <i class="fas fa-sync-alt"></i>
                            <span>Обновить параметры</span>
                        </button>
                    </div>

                    <!-- Notification zone -->
                    <div id="notificationZone" class="notification-zone" style="display: none;"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- WYSIWYG Editor Modal -->
    <div id="wysiwygModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 99vw; height: 99vh;">
            <div class="modal-header">
                <h3>Редактирование промта</h3>
                <button type="button" class="submit-button" id="wysiwygModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div id="wysiwyg-editor-container" class="wysiwyg-modal-container"></div>
            </div>
            <div class="modal-footer">
                <button type="button" id="wysiwygSaveBtn" class="submit-button">
                    <i class="fas fa-save"></i>
                    <span>Сохранить</span>
                </button>
                <button type="button" id="wysiwygCancelBtn" class="submit-button">
                    <i class="fas fa-times"></i>
                    <span>Отменить</span>
                </button>
            </div>
        </div>
    </div>

    <script>
    // Theme switcher
    (function() {
        const toggle = document.getElementById('themeToggle');
        const label = document.getElementById('themeLabel');
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggle.checked = true;
            label.textContent = 'Тёмная';
        }
        toggle.addEventListener('change', function() {
            if (this.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                label.textContent = 'Тёмная';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                label.textContent = 'Светлая';
                localStorage.setItem('theme', 'light');
            }
        });
    })();

    // Settings logic
    (async function() {
        const mechanismSelect = document.getElementById('mechanismModelSelect');
        const select = document.getElementById('reportTypeSelect');
        const nameTextarea = document.getElementById('reportNameTextarea');
        const textarea = document.getElementById('promptTextarea');
        const saveBtn = document.getElementById('saveButton');
        const refreshBtn = document.getElementById('refreshButton');
        const notif = document.getElementById('notificationZone');
        let currentMechanism = 'vibevoice'; // по умолчанию VibeVoice

        // WYSIWYG Editor
        let editorInstance = null;

        function openPromptEditor() {
            const modal = document.getElementById('wysiwygModal');
            if (!modal) return;

            // Destroy previous instance if exists
            if (editorInstance) {
                editorInstance.destroy();
                editorInstance = null;
            }

            // Initialize editor
            editorInstance = new MarkdownWYSIWYG('wysiwyg-editor-container', {
                initialValue: textarea.value,
                showToolbar: true,
                initialMode: 'wysiwyg',
            });

            // Make textarea readonly
            textarea.readOnly = true;

            // Show modal
            modal.style.display = 'flex';
        }

        function savePromptEditor() {
            if (!editorInstance) return;

            const markdown = editorInstance.getValue();
            textarea.value = markdown;
            textarea.readOnly = false;
            textarea.dispatchEvent(new Event('input')); // triggers checkChanged()

            closePromptEditor();
        }

        function cancelPromptEditor() {
            if (!editorInstance) return;

            textarea.readOnly = false;
            closePromptEditor();
        }

        function closePromptEditor() {
            const modal = document.getElementById('wysiwygModal');
            if (modal) modal.style.display = 'none';
            if (editorInstance) {
                editorInstance.destroy();
                editorInstance = null;
            }
        }

        // Open editor on button click
        document.getElementById('editPromptBtn').addEventListener('click', openPromptEditor);

        // Save button
        document.getElementById('wysiwygSaveBtn').addEventListener('click', savePromptEditor);

        // Cancel button
        document.getElementById('wysiwygCancelBtn').addEventListener('click', cancelPromptEditor);

        // Close button (X)
        document.getElementById('wysiwygModalClose').addEventListener('click', cancelPromptEditor);

        // Close on overlay click
        document.getElementById('wysiwygModal').addEventListener('click', function(e) {
            if (e.target === this) cancelPromptEditor();
        });

        // Close on ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('wysiwygModal');
                if (modal && modal.style.display !== 'none') {
                    cancelPromptEditor();
                }
            }
        });

        let originalPrompts = {}; // {id: prompt} — для сравнения
        let originalNames = {}; // {id: name} — для сравнения
        let selectedOriginal = null; // оригинальный промпт выбранного отчета
        let selectedOriginalName = null; // оригинальное название выбранного отчета
        let reportTypesData = null; // данные отчетов для хендлера

        function showToast(msg, type) {
            notif.removeAttribute('style');
            notif.style.display = 'block';
            notif.textContent = msg;
            notif.style.color = type === 'success' ? 'var(--success-color)' : 'var(--error-color)';
            notif.style.marginTop = '16px';
            notif.style.padding = '8px 12px';
            notif.style.borderRadius = '6px';
            notif.style.border = `1px solid ${type === 'success' ? 'var(--success-color)' : 'var(--error-color)'}`;
            setTimeout(function() { notif.removeAttribute('style'); notif.style.display = 'none'; }, 3000);
        }

        refreshBtn.addEventListener('click', async function() {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Обновление...</span>';

            try {
                const resp = await fetch('/api/v1/settings/refresh', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                });
                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.detail || 'Ошибка обновления');
                }

                // Обновить select report types
                select.innerHTML = '';
                data.settings.forEach(function(t) {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = t.name;
                    originalPrompts[t.id] = t.prompt || '';
                    originalNames[t.id] = t.name || '';
                    select.appendChild(opt);
                });

                // Сбросить выбранный отчет на первый
                const firstId = data.settings[0]?.id;
                if (firstId) {
                    select.value = firstId;
                    select.dispatchEvent(new Event('change'));
                }

                reportTypesData = {types: data.settings};
                showToast('Параметры обновлены', 'success');
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> <span>Обновить параметры</span>';
            }
        });

        // Загрузить отчеты
        try {
            const resp = await fetch('/api/v1/settings');
            reportTypesData = await resp.json();
            if (!reportTypesData.types || reportTypesData.types.length === 0) {
                select.innerHTML = '<option value="" disabled selected>Нет типов отчетов</option>';
                return;
            }

            // Удалить плейсхолдер "Загрузка..."
            mechanismSelect.innerHTML = '';

            // Заполнить селектор механизмов
            const vvOpt = document.createElement('option');
            vvOpt.value = 'vibevoice';
            vvOpt.textContent = 'VibeVoice (' + reportTypesData.vibevoice_model + ')';
            mechanismSelect.appendChild(vvOpt);

            const wOpt = document.createElement('option');
            wOpt.value = 'whisper';
            wOpt.textContent = 'Whisper (' + reportTypesData.whisper_model + ')';
            mechanismSelect.appendChild(wOpt);

            mechanismSelect.value = 'vibevoice';
            mechanismSelect.dispatchEvent(new Event('change'));

            select.innerHTML = '';
            reportTypesData.types.forEach(function(t) {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.name;
                originalPrompts[t.id] = t.prompt || '';
                originalNames[t.id] = t.name || '';
                select.appendChild(opt);
            });
        } catch (e) {
            select.innerHTML = '<option value="" disabled selected>Ошибка загрузки</option>';
            return;
        }

        // Переключение механизма
        mechanismSelect.addEventListener('change', function() {
            currentMechanism = this.value;
        });

        // При смене отчета
        select.addEventListener('change', function() {
            const id = this.value;
            if (!id) return;
            const type = reportTypesData.types.find(t => t.id === id);
            if (type) {
                nameTextarea.value = type.name;
            }
            textarea.value = originalPrompts[id] || '';
            selectedOriginal = originalPrompts[id] || '';
            selectedOriginalName = originalNames[id] || '';
            checkChanged();
        });

        // При ручном редактировании промпта или названия
        textarea.addEventListener('input', checkChanged);
        nameTextarea.addEventListener('input', checkChanged);

        // Автовыбор первого отчета
        if (!reportTypesData || !reportTypesData.types || reportTypesData.types.length === 0) return;
        const firstId = reportTypesData.types[0].id;
        select.value = firstId;
        select.dispatchEvent(new Event('change'));

        function checkChanged() {
            saveBtn.disabled = (textarea.value === selectedOriginal && nameTextarea.value === selectedOriginalName);
        }

        // Сохранить
        saveBtn.addEventListener('click', async function() {
            const id = select.value;
            if (!id) return;
            const name = nameTextarea.value;
            const prompt = textarea.value;

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Сохранение...</span>';

            try {
                const resp = await fetch('/api/v1/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({report_type: id, name: name, prompt: prompt})
                });
                const result = await resp.json();
                if (!resp.ok) {
                    throw new Error(result.detail || 'Ошибка сохранения');
                }
                // Обновить кэш оригиналов
                originalNames[id] = name;
                originalPrompts[id] = prompt;
                selectedOriginalName = name;
                selectedOriginal = prompt;
                checkChanged();
                showToast('Настройки сохранены', 'success');
            } catch (e) {
                showToast(e.message, 'error');
                checkChanged();
            } finally {
                saveBtn.disabled = (textarea.value === selectedOriginal);
                saveBtn.innerHTML = '<i class="fas fa-save"></i> <span>Сохранить</span>';
            }
        });
    })();
    </script>
</body>
</html>
